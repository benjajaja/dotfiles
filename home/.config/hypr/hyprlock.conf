animations {
    enabled = false
}

background {
    monitor =
    color = rgba(200, 17, 17, 1.0)
}

label {
    monitor =
    text = SYSTEM LOCKDOWN
    color = rgba(255, 222, 0, 1.0)
    font_size = 128
    font_family = EnvyCodeR Nerd Font Mono
