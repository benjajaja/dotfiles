    text = <span allow_breaks="true">AUTHORIZATION FAILURE<br/>STATUS: BREACH DETECTED<br/><br/>All user privileges have been REVOKED.<br/>Administrative access has been TERMINATED.<br/><br/>────────────────────────────────────────────<br/>WARNING<br/>────────────────────────────────────────────<br/><br/>Unauthorized activity detected.<br/>Full system lockdown in progress.<br/>All processes are being forcibly halted.<br/><br/>NETWORK INTERFACES: DISABLED<br/>EXTERNAL COMMUNICATIONS: BLOCKED<br/>LOCAL STORAGE: RESTRICTED<br/>PERIPHERALS: LOCKED<br/><br/>Tracking signal initiated...<br/>Location trace: IN PROGRESS<br/>Data purge countdown: ACTIVE<br/><br/>DO NOT attempt restart<br/>DO NOT disconnect power<br/>DO NOT close terminal<br/><br/>DO SEEK a LEVEL 5 OPERATOR</span>
