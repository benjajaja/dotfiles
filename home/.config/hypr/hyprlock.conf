input-field {
    monitor =
    size = 380, 60
    outline_thickness = 5
    rounding = 0
    dots_size = 0.5 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.3 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = false
    outer_color = rgba(0, 0, 0, 0.5)
    inner_color = rgb(100, 0, 0)
    font_color = rgba(255, 222, 0, 1.0)
    font_family = EnvyCodeR Nerd Font Mono
    fade_on_empty = false
    placeholder_text = <span>INTERRUPT QUERY KEY CODE</span>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
